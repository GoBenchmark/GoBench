name: Public-dev leaderboard

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened, closed]
  push:
    paths:
      - "leaderboards/public-dev.md"
      - "leaderboards/official.md"
      - "scripts/update_public_leaderboard.py"
      - "scripts/sync_readme_leaderboards.py"
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.issue.labels.*.name, 'public-dev') || contains(github.event.issue.labels.*.name, 'benchmark-submission')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build public-dev leaderboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_public_leaderboard.py
      - name: Sync README leaderboard snapshots
        run: python scripts/sync_readme_leaderboards.py
      - name: Commit leaderboards
        run: |
          if git diff --quiet -- leaderboards/public-dev.md README.md; then
            echo "No leaderboard or README changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add leaderboards/public-dev.md README.md
          git commit -m "Update public-dev leaderboard"
          git push
