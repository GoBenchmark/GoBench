# GoBench official KataGo analysis config.
#
# This config is intentionally deterministic and leaderboard-oriented.
# Use with:
#   export KATAGO_CONFIG=configs/katago_gobench_official.cfg
#   export KATAGO_MAX_VISITS=2048
#   export KATAGO_ANALYSIS_PV_LEN=12

logDir = analysis_logs
warnUnusedFields = true

reportAnalysisWinratesAs = SIDETOMOVE
maxVisits = 2048
analysisPVLen = 12
wideRootNoise = 0.0
ignorePreRootHistory = true

# Single-threaded search is slower, but makes the scorer easier to reproduce.
# The official hosted scorer should keep these fixed for a published leaderboard.
numAnalysisThreads = 1
numSearchThreadsPerAnalysisThread = 1

nnMaxBatchSize = 32
nnCacheSizePowerOfTwo = 23
nnMutexPoolSizePowerOfTwo = 17
nnRandomize = false
