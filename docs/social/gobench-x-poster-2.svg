    <g transform="translate(850 740)">
      <circle cx="18" cy="0" r="13" fill="#f7c948" stroke="#6d4b00" stroke-width="3"/>
      <text x="42" y="8" font-size="21" fill="#48515d">KataGo candidate</text>
      <circle cx="270" cy="0" r="17" fill="none" stroke="#0f62fe" stroke-width="6"/>
      <text x="300" y="8" font-size="21" fill="#48515d">Model move</text>
    </g>

    <text x="116" y="794" font-size="24" font-weight="760" fill="#121418">github.com/GoBenchmark/GoBench</text>
  </g>
